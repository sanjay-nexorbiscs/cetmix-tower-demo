            {% if odoo_limit_time_real %}
              --limit-time-real={{ odoo_limit_time_real }} \
            {% endif %}
            {% if odoo_limit_memory_soft %}
              --limit-memory-soft={{ odoo_limit_memory_soft }} \
            {% endif %}
            {% if odoo_limit_memory_hard %}
              --limit-memory-hard={{ odoo_limit_memory_hard }} \
            {% endif %}
            {% if  odoo_log_level %}
               --log-level={{ odoo_log_level }} \
            {% endif %}
            {% if  odoo_log_handler %}
               --log-handler={{ odoo_log_handler }} \
            {% endif %}
            {% if  odoo_log_level %}
               --log-level={{ odoo_log_level }} \
            {% endif %}
            {% if odoo_log_web %}
               --log-web \
            {% endif %}
            {% if odoo_log_sql %}
               --log-sql \
            {% endif %}
            {% if  odoo_workers %}
              --workers={{ odoo_workers }} \
            {% endif %}
            {% if  odoo_load %}
              --load={{ odoo_load }} \
            {% endif %}
            {% if odoo_proxy_mode and odoo_proxy_mode != "no" %}
              --proxy-mode \
            {% endif %}
            {% if odoo_no_db_list and odoo_no_db_list != "no" %}
              --no-database-list \
            {% endif %}
            {% if (odoo_gevent_port and odoo_gevent_port != '0') or (odoo_longpolling_port and odoo_longpolling_port != '0') and odoo_workers and odoo_workers != '0'  %}
