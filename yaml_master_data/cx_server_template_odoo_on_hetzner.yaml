                applied_expression: false
                validation_pattern: false
                validation_message: false
                note: |-
                  Specifies the data directory location within the Postgres container.
                  Do not modify unless really needed
              - access_level: manager
                reference: pg_autovacuum_max_workers
                name: Postgres Autovacuum Max Workers
                variable_type: s
                applied_expression: false
                validation_pattern: false
                validation_message: false
                note: |-
                  Meaning: Maximum number of autovacuum worker processes that can run at the same time.
                  Default: 3
                  Effect:
                  If you have many tables needing vacuum/analyze at once, only 3 will be processed in parallel.
                  Increasing this value allows PostgreSQL to process more tables simultaneously, which can reduce bloat and dead tuples buildup faster.
                  But each worker consumes resources (CPU, memory, I/O). Too many workers on a busy system can compete with your queries.
              - access_level: manager
                reference: pg_autovacuum_naptime
                name: Postgres Autovacuum Naptime
                variable_type: s
                applied_expression: false
                validation_pattern: false
                validation_message: false
                note: "Meaning: Time between autovacuum rounds \u2014 i.e., how often\
                  \ the autovacuum launcher wakes up to check for tables needing maintenance.\n\
                  Default: 1 minute\nEffect:\nAt 30s, autovacuum checks twice per\
                  \ minute instead of once.\nMore frequent checks \u2192 more responsive\
                  \ cleanup, especially for very active tables.\nToo aggressive checks\
                  \ can increase system load, but usually 30s is safe for busy databases."
              - access_level: manager
                reference: pg_autovacuum_work_mem
                name: Postgres Autovacuum Work Mem
                variable_type: s
                applied_expression: false
                validation_pattern: false
                validation_message: false
                note: "Meaning: Memory available per autovacuum worker for processing.\n\
                  Default: -1 (uses maintenance_work_mem, often 64MB).\nEffect:\n\
                  Higher memory allows vacuum to use larger internal sort/scan structures\
                  \ (useful for big tables with lots of dead tuples).\nReduces the\
                  \ chance that the worker spills to disk, which is slow.\nSince this\
                  \ is per worker, with autovacuum_max_workers=3, the total potential\
                  \ memory consumption is 3 \xD7 256MB = 768MB."
              - access_level: manager
                reference: pg_checkpoint_completion_target
                name: Postgres Checkpoint Completion Target
                variable_type: s
                applied_expression: false
                validation_pattern: false
                validation_message: false
                note: "Controls how gradually checkpoints are written to disk \u2014\
                  \ it\u2019s a value between 0.0 and 1.0 that tells PostgreSQL what\
                  \ fraction of the checkpoint interval it should spread the writes\
                  \ over.\nCheckpoints flush dirty pages (modified data in memory)\
                  \ to disk to ensure durability. This can cause I/O spikes if too\
                  \ many pages are written all at once.\npg_checkpoint_completion_target\
                  \ helps smooth out disk I/O by spreading the work over time.\nDefault:\
                  \ 0.5\nRecommended: 0.7 \u2013 0.9 for most production systems"
              - access_level: manager
                reference: pg_default_statistics_target
                name: Postgres Default Statistics Target
                variable_type: s
                applied_expression: false
                validation_pattern: false
                validation_message: false
                note: |-
                  Controls the amount of statistical data PostgreSQL collects about each column during ANALYZE. This data helps the query planner make smart decisions about which indexes and join strategies to use.
                  PostgreSQL uses column statistics to estimate:
                  Data distribution (e.g. histograms, most common values)
                  Row selectivity (how many rows match a filter)
                  Join cardinality (how many rows will result from a join)
                  Higher stats target = more accurate estimates = better query plans
                  But: more stats = longer ANALYZE time and larger pg_statistic table.
                  Default: 100
                  Allowed Range: 0 to 10,000
              - access_level: manager
                reference: pg_effective_cache_size
                name: Postgres Effective Cache Size
                variable_type: s
                applied_expression: false
                validation_pattern: false
                validation_message: false
                note: "A PostgreSQL planner hint \u2014 it estimates how much memory\
                  \ is available for caching data, including:\nOS-level disk cache\
                  \ (the page cache)\nPostgreSQL\u2019s shared_buffers\nAnything else\
                  \ that helps avoid disk reads\nIt doesn\u2019t allocate memory \u2014\
                  \ it just helps PostgreSQL decide if using an index is worth it.\
                  \ A higher value makes index scans and nested loops look more appealing\
                  \ in the query planner.\nDefault: 4GB (on many systems)\nTypical\
                  \ recommendation:\n\U0001F449 Set it to about 50\u201375% of your\
                  \ total system memory"
              - access_level: manager
                reference: pg_effective_io_concurrency
                name: Postgres Effective I/O Concurrency
                variable_type: s
                applied_expression: false
                validation_pattern: false
                validation_message: false
                note: |-
                  Tells the query planner how many I/O operations (disk reads) your storage system can handle in parallel.
                  It affects cost estimates for operations that involve many disk reads, such as: Bitmap index scans
                  Index-only scans, Sequential scans on large tables.
                  If PostgreSQL knows your system can read multiple blocks at once, it may favor parallel I/O strategies.
                  Default: 1
                  Range: 0 (disable) to 1000
              - access_level: manager
                reference: pg_maintenance_work_mem
                name: Postgres Maintenancem Work Memory
                variable_type: s
                applied_expression: false
                validation_pattern: false
                validation_message: false
                note: "Controls how much memory PostgreSQL can use per session for\
                  \ maintenance operations, including: VACUUM, ANALYZE, CREATE INDEX,\
                  \ ALTER TABLE, ADD FOREIGN KEY, REINDEX\nDefault: 64MB\nRecommended\
                  \ range: 128MB \u2013 1GB+ (depending on your available RAM and\
                  \ workload)"
              - access_level: manager
                reference: pg_max_connections
                name: Postgres Max Connections
                variable_type: s
                applied_expression: false
                validation_pattern: false
                validation_message: false
                note: "Defines the maximum number of concurrent client connections\
                  \ allowed to PostgreSQL at any one time.\nEvery connection (via\
                  \ psql, app server, pgAdmin, etc.) uses:\nA backend process\nA slice\
                  \ of memory (especially work_mem, session memory, etc.)\nDefault:\
                  \ 100\nRange: 1 to 262143 (but practically much lower)\nRealistic\
                  \ safe values:\nSmall servers: 50\u2013200\nMid-sized: 200\u2013\
                  500\nLarge (with pooling): 500+"
              - access_level: manager
                reference: pg_max_parallel_maintenance_workers
                name: Postgres Max Parallel Maintenance Workers
                variable_type: s
                applied_expression: false
                validation_pattern: ^\d+$
                validation_message: false
                note: |-
                  Controls how many parallel worker processes PostgreSQL can use for maintenance operations, specifically: CREATE INDEX, REINDEX, VACUUM (in some cases).
                  It defines the maximum number of workers that PostgreSQL can use per maintenance command to speed up operations by processing index pages in parallel.
                  Default: 2
                  Range: 0 to max_parallel_workers
              - access_level: manager
                reference: pg_max_parallel_workers
                name: Postgres Max Parallel Workers
                variable_type: s
                applied_expression: false
                validation_pattern: ^\d+$
                validation_message: false
                note: |-
                  Setting that defines the total number of parallel worker processes the system can use across all queries at the same time.
                  It sets a global cap on the number of parallel workers used for Parallel queries (SELECT, CREATE INDEX, etc.), Background maintenance tasks (if parallelized), Any other internal use of parallel workers.
                  This number must be less than or equal to max_worker_processes, because parallel workers are a subset of total background workers.
                  Default: 8
                  Allowed Range: 0 to max_worker_processes
              - access_level: manager
                reference: pg_max_parallel_workers_per_gather
                name: Postgres Max Parallel Workers per Gather
                variable_type: s
                applied_expression: false
                validation_pattern: ^\d+$
                validation_message: false
                note: |-
                  Configuration setting that controls the maximum number of parallel worker processes a single parallel query (like a SELECT) can use during a Gather or Gather Merge operation.
                  When PostgreSQL runs a query with parallel execution, it uses a "gather" node to collect results from multiple parallel worker processes.
                  pg_max_parallel_workers_per_gather limits how many workers a single query can use in that process.
                  Default: 2
                  Range: 0 to max_parallel_workers
              - access_level: manager
                reference: pg_max_wal_size
                name: Postgres Max Wal Size
                variable_type: s
                applied_expression: false
                validation_pattern: false
                validation_message: false
                note: "Setting that defines the maximum size the WAL (Write-Ahead\
                  \ Log) directory (pg_wal/) is allowed to grow between automatic\
                  \ checkpoints.\nPostgreSQL writes all changes to WAL before flushing\
                  \ to disk.\nIf WAL grows too large, PostgreSQL forces a checkpoint\
                  \ to flush data and clean up.\nThis setting tells PostgreSQL:\n\u201C\
                  Don\u2019t let WAL exceed this size \u2014 if it does, trigger a\
                  \ checkpoint.\u201D\nDefault (PostgreSQL 13+): 1GB\nTypical values\
                  \ for production: 2GB to 16GB or more depending on Disk speed. Write\
                  \ volume. Checkpoint tuning strategy."
              - access_level: manager
                reference: pg_max_worker_processes
                name: Postgres Max Worker Processes
                variable_type: s
                applied_expression: false
                validation_pattern: ^\d+$
                validation_message: false
                note: |-
                  Defines the maximum number of background worker processes PostgreSQL can run at the same time.
                  Default: 8
                  Minimum: 1
                  Maximum: Usually limited by system resources
              - access_level: manager
                reference: pg_min_wal_size
                name: Postgres Min WAL Size
                variable_type: s
                applied_expression: false
                validation_pattern: false
                validation_message: false
                note: "PostgreSQL configuration parameter that sets the minimum size\
                  \ the WAL (Write-Ahead Log) directory (pg_wal/) will try to maintain,\
                  \ even after a checkpoint.\nWhen PostgreSQL writes changes, it first\
                  \ logs them in WAL files.\nOver time, these WAL files can pile up.\n\
                  After a checkpoint, PostgreSQL may delete old WAL files\u2014but\
                  \ not below pg_min_wal_size.\nDefault: 80MB\nTypical values: 512MB,\
                  \ 1GB, even 2GB+ for write-heavy systems."
              - access_level: manager
                reference: postgres_port
                name: Postgres Port
                variable_type: s
                applied_expression: false
                validation_pattern: ^\d+$
                validation_message: false
                note: |-
                  Use this variable only if you need to expose PG port.
                  Otherwise default Postgres port will be used.
              - access_level: manager
                reference: pg_random_page_cost
                name: Postgres Random Page Cost
                variable_type: s
                applied_expression: false
                validation_pattern: false
                validation_message: false
                note: "PostgreSQL planner setting that influences how expensive it\
                  \ thinks random I/O is when deciding whether to use an index scan\
                  \ or a sequential scan.\nHigher value = Random reads are expensive\
                  \ \u2192 favors sequential scans.\nLower value = Random reads are\
                  \ cheaper \u2192 more likely to choose index scans.\nDefault: 4.0\n\
                  Typical tuned values: between 1.1 and 2.5, depending on hardware\
                  \ and workload."
              - access_level: manager
                reference: pg_shared_buffers
                name: Postgres Shared Buffers
                variable_type: s
                applied_expression: false
                validation_pattern: false
                validation_message: false
                note: "Controls how much memory PostgreSQL uses for caching data (tables,\
                  \ indexes, etc.) in RAM.\nIt\u2019s PostgreSQL\u2019s main memory\
                  \ cache.\nWhen a query runs, PostgreSQL first looks in shared_buffers\
                  \ before going to disk.\nIt reduces I/O, boosts performance, and\
                  \ helps PostgreSQL serve repeat queries faster."
              - access_level: manager
                reference: postgres_shm_size
                name: Postgres Shared Memory Size
                variable_type: s
                applied_expression: false
                validation_pattern: false
                validation_message: false
                note: "Refers to the amount of shared memory allocated to PostgreSQL,\
                  \ especially when running PostgreSQL inside a Docker container.\
                  \ It\u2019s particularly important for features like parallel queries,\
                  \ in-memory operations, and performance tuning.\nDefault is too\
                  \ low (64MB).\nFor production, at least 256MB or 512MB is often\
                  \ recommended.\nFor workloads with high concurrency or parallel\
                  \ queries, 1GB+ may help."
              - access_level: manager
                reference: postgres_user
                name: Postgres User
                variable_type: s
                applied_expression: false
                validation_pattern: false
                validation_message: false
                note: This user will be used to connect to Postgres server
              - reference: postgres_version
              - access_level: manager
                reference: pg_wal_buffers
                name: Postgres WAL Buffers
                variable_type: s
                applied_expression: false
                validation_pattern: false
                validation_message: false
                note: "Configuration setting that controls the amount of memory reserved\
                  \ for buffering WAL (Write-Ahead Logging) data before it's written\
                  \ to disk.\nEvery time PostgreSQL modifies data (e.g. insert, update,\
                  \ delete), it first writes a WAL record.\nThese WAL records are\
                  \ temporarily stored in memory (WAL buffers) before being flushed\
                  \ to disk.\nThis buffering improves performance by reducing the\
                  \ number of disk writes.\nIf shared_buffers is \u2264 512MB \u2192\
                  \ pg_wal_buffers = 16MB\nOtherwise \u2192 calculated automatically\
                  \ by PostgreSQL (often 1/32 of shared_buffers, capped at 16MB in\
                  \ older versions, but higher in newer ones)."
              - access_level: manager
                reference: pg_work_mem
                name: Postgres Work Mem
                variable_type: s
                applied_expression: false
                validation_pattern: false
                validation_message: false
                note: "Controls how much memory is allocated per operation for internal\
                  \ query operations like Sorts, Hash joins, Materialized CTEs, Hash\
                  \ aggregations.\nEach time PostgreSQL runs a sort or join, it can\
                  \ use up to work_mem before spilling to disk (which is much slower).\
                  \ So:\nHigher work_mem \u2192 Faster queries (if memory allows).\n\
                  Too high \u2192 Risk of out-of-memory crashes, especially with many\
                  \ concurrent queries."
              - reference: shared_postgres_data
              - reference: shared_postgres_name
              - access_level: manager
                reference: shared_postgres_restart_policy
                name: Shared Postgres Restart Policy
                variable_type: o
