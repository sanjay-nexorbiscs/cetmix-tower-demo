            condition: '{{ hetzner_server_id }} and {{ tower.server.status }} != "running"'
            use_sudo: false
            path: false
            command_id:
              access_level: manager
              reference: check_hetzner_server_running
              name: Ensure Hetzner server is running
              action: python_code
              allow_parallel_run: false
              note: Check Hetzner server status to ensure it is running
              path: false
              code: "# Available variables:\n#  - user: Current Odoo User\n#  - env:\
                \ Odoo Environment on which the action is triggered\n#  - server:\
                \ server on which the command is run\n#  - tower: 'cetmix.tower' helper\
                \ class\n#  - time, datetime, dateutil, timezone: useful Python libraries\n\
                #  - requests: Python 'requests' library. Available methods: 'post',\
                \ 'get', 'request'\n#  - json: Python 'json' library. Available methods:\
                \ 'dumps'\n#  - float_compare: Odoo function to compare floats based\
                \ on specific precisions\n#  - UserError: Warning Exception to use\
                \ with raise\n#\n# Each python code command returns the result value\
                \ which is a dictionary.\n# There are two default keys in the dictionary,\
                \ e.g.:\n# x = 2*10\n# result = {\n#    \"exit_code\": x,\n#    \"\
                message\": \"This will be logged as an error message because exit\
                \ code !=0\",\n# }\n\n# Get server ID\nserver_id = {{ hetzner_server_id\
                \ }}\n\n\n# Exit if server id is not defined\nif not server_id:\n\
                \  result = {\n      \"exit_code\": -1,\n      \"message\": \"Server\
                \ ID is not definded for server\",\n  }\n  \nelse:\n  # ---\n  # Query\
                \ status from Hetzner\n  # ---\n  \n  status_url = \"https://api.hetzner.cloud/v1/servers/\"\
                +server_id\n  api_token = #!cxtower.secret.hetzner_api_token!#\n \
                \ server_status_check_retries = {{ server_status_check_retries }}\
                \ or \"10\"  # Default numer of retries\n  server_status_check_delay\
                \ = {{ server_status_check_delay }} or \"15\" # Wait timeout in seconds\n\
                \  \n  # Set the required headers\n  headers = {\n      'Authorization':\
                \ 'Bearer '+ api_token,\n      'Content-Type': 'application/json'\n\
                \  }\n  \n  # Fallback result\n  result = {\n        \"exit_code\"\
                : -5,\n        \"message\": \"Status update timeout after \" + server_status_check_retries\
                \  + \" attempts\",\n    }\n  \n  # Query server status\n  for attempt\
                \ in range(int(server_status_check_retries)):\n    \n    # Make the\
                \ request to get server details\n    status_response = requests.get(status_url,\
                \ headers=headers)\n    \n    # Check \n    if status_response.status_code\
                \ == 200:\n      exit_code = 0\n      result = status_response.json()\n\
                \      # Extract the server status\n      server_status = result['server']['status']\n\
                \      if server_status == 'running':\n        result = {\n      \
                \      \"exit_code\": 0,\n            \"message\": \"Server is running\"\
                ,\n        }\n        break\n      else:\n        time.sleep(int(server_status_check_delay))\n\
                \        result = {\n            \"exit_code\": -3,\n            \"\
                message\": status_response.json(),\n      }\n    else:\n      result\
                \ = {\n            \"exit_code\": -3,\n            \"message\": \"\
                Connection error\",\n      }\n      break\n  \n"
              server_status: running
              variable_ids:
              - reference: hetzner_server_id
              - access_level: manager
