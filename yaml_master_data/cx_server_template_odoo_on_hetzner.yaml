        access_level: manager
        reference: remove_dns_record_from_cloudflare
        name: Remove DNS record from Cloudflare
        action: python_code
        allow_parallel_run: false
        note: Delete Cloudflare DNS record
        tag_ids:
        - reference: dns
        - reference: cloudflare
        path: false
        code: |-
          # ----------------
          # Tower properties
          # ----------------

          # Ensure your domain matches your DNS Zone!
          instance_url = {{ instance_url }}
          cloudflare_zone_id = #!cxtower.secret.cloudflare_zone_id!#
          cloudflare_token = #!cxtower.secret.cloudflare_token!#
          request_timeout = 15 # increase in case of unstable network connection

          # -------------
          # Get record ID
          # -------------

          url = "https://api.cloudflare.com/client/v4/zones/"+cloudflare_zone_id+"/dns_records"
          headers = {
              "Content-Type": "application/json",
              "Authorization": "Bearer "+cloudflare_token,
          }

          # Send request to Cloudflare
          response = requests.get(url, headers=headers, timeout=request_timeout)

          # Default Tower success exit code is 0. However requests success code is 200.
          # Following code convers requests success code into the Tower one

          record_id = False
          exit_code = -1
          message = "Command failed"

          if response.status_code == 200:
            records = response.json()["result"]
            if records:
              # Find the record ID of the subdomain
              for record in records:
                if record.get("name") == instance_url:
                    record_id = record.get("id")
                    break
          else:
            exit_code = response.status_code
            message = response.text

          # -----------------
          # Remove the record
          # -----------------
          if record_id:
              delete_url = "https://api.cloudflare.com/client/v4/zones/"+cloudflare_zone_id+"/dns_records/"+str(record_id)

              # Make DELETE request
              delete_response = requests.delete(delete_url, headers=headers)

              # Check if deletion was successful
              if delete_response.status_code == 200:
                  exit_code = 0
                  message = response.text
              else:
                  exit_code = response.status_code
                  message = response.text

          result = {
              "exit_code": exit_code,
              "message": message,
          }
        server_status: false
        variable_ids:
        - reference: instance_url
        secret_ids:
        - reference: cloudflare_token
        - reference: cloudflare_zone_id
        no_split_for_sudo: false
        if_file_exists: skip
        disconnect_file: false
