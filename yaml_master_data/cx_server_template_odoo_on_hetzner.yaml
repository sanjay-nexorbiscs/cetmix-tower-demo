        file_template_id:
          reference: cetmix_odoo_image_install_addons
          name: 'Cetmix Odoo image: install addons'
          source: tower
          file_type: text
          server_dir: '{{ dockerfile_location }}'
          file_name: Dockerfile
          keep_when_deleted: false
          tag_ids:
          - reference: docker
          - reference: odoo
          note: This is a new dockerfile that benefits from smart layer caching
          code: "# This image is designed to be used with Cetmix Tower <https://cetmix.com/tower>\n\
            # However it can be used for standalone deployments too.\n# Parts of both\
            \ Odoo and OCA Docker files are being used. \n# Copyright 2024 Cetmix\
            \ OU <https://cetmix.com>\n#\n# This installs extra addons in the image\
            \ built using Dockerfile.odoo\nARG ODOO_VERSION\nFROM tower-odoo-core:{{\
            \ odoo_version }}-{{ odoo_edition }}\nLABEL maintainer=\"Cetmix OU <https://cetmix.com>\"\
            \nARG ODOO_VERSION\n\n# Tokens to clone private repos\nARG GITHUB_TOKEN\n\
            ARG BITBUCKET_TOKEN\nARG GITLAB_TOKEN_NAME\nARG GITLAB_TOKEN\n\nARG TMP_ADDONS_DIR=/tmp/getaddons\n\
            \nUSER root\n\n# Install extra packages\n{% if install_python_packages=='yes'\
            \ %}\nCOPY ./extra-packages.txt /tmp\nRUN pip install -r /tmp/extra-packages.txt\n\
            {% endif %}\n\n# Clone extra addons\n# This arg is used for cache invalidation\
            \ so every layer below will be rebuilt\nARG EXTRA_ADDONS_RELEASE=put_any_value_here\n\
            \n# Copy addons list file\nCOPY ./addons.yml $TMP_ADDONS_DIR\n\n# Git\
            \ settings used by GitAggregator\nENV GIT_USERNAME=\"Doge\"\nENV GIT_EMAIL=\"\
            doge@meme.example.com\"\n\n# Run git-aggregator\nRUN git config --global\
            \ user.email ${GIT_EMAIL} && git config --global user.name ${GIT_USERNAME}\
            \ && \\\n    cd $TMP_ADDONS_DIR && gitaggregate -c  $TMP_ADDONS_DIR/addons.yml\
            \ --expand-env\n\n# Prepare the destination directory\nENV ADDONS_DIR=/opt/extra-addons\n\
            RUN mkdir $ADDONS_DIR \\\n    && chown odoo $ADDONS_DIR\n\n# Move all\
            \ addons to their final destination\nRUN bash -c ' \\\n    # Function\
            \ to check each directory and skip symlinks \\\n    check_directory()\
            \ { \\\n        local dir=\"$1\"; \\\n        # If this is a symlink,\
            \ do nothing \\\n        if [[ -L \"$dir\" ]]; then \\\n            return;\
            \ \\\n        fi; \\\n        if [[ -f \"$dir/__manifest__.py\" ]]; then\
            \ \\\n            cp -r -P \"$dir\" \"$ADDONS_DIR\"; \\\n        else\
            \ \\\n            for subdir in \"$dir\"/*/; do \\\n                if\
            \ [[ -d \"$subdir\" && ! -L \"$subdir\" ]]; then \\\n                \
            \    check_directory \"$subdir\"; \\\n                fi; \\\n       \
            \     done; \\\n        fi; \\\n    }; \\\n    # If __manifest__.py exists\
            \ in the top-level directory, copy the entire directory \\\n    if [[\
            \ -f \"$TOP_LEVEL_DIR/__manifest__.py\" ]]; then \\\n        cp -r -P\
            \ \"$TMP_ADDONS_DIR\" \"$ADDONS_DIR\"; \\\n    else \\\n        check_directory\
            \ \"$TMP_ADDONS_DIR\"; \\\n    fi; \\\n    '\nRUN rm -rf $TMP_ADDONS_DIR\n\
            \n# List addons\nRUN  ls -lah $ADDONS_DIR && rm -rf $TMP_ADDONS_DIR\n\n\
            # Install external dependencies\nRUN if [ \"$(ls -A $ADDONS_DIR 2>/dev/null)\"\
            \ ]; then \\\n        deps=$(manifestoo -d $ADDONS_DIR list-external-dependencies\
            \ deb --transitive --ignore-missing); \\\n        if [ -n \"$deps\" ];\
            \ then \\\n            apt-get update -qq && \\\n            DEBIAN_FRONTEND=noninteractive\
            \ apt-get install -qq --no-install-recommends ${deps}; \\\n        fi;\
            \ \\\n    fi\n\n# Create hatch config file\nRUN if [ \"$(ls -A $ADDONS_DIR\
            \ 2>/dev/null)\" ]; then \\\n    printf \"[build-system]\\nrequires =\
            \ ['hatchling', 'hatch-odoo']\\nbuild-backend = 'hatchling.build'\\n\\\
            n[project]\\nname = 'extra-addons'\\nversion = '1.0'\\ndynamic = ['dependencies']\\\
            n\\n[tool.hatch.metadata.hooks.odoo-addons-dependencies]\\n\\n[tool.hatch.build.hooks.odoo-addons-dirs]\\\
            n\\n[tool.hatch-odoo]\\nodoo_version_override = \\\"%s\\\"\\ndependencies\
            \ = ['click-odoo-contrib']\\naddons_dirs = ['.']\\n\" \"$ODOO_VERSION\"\
            \ > /opt/extra-addons/pyproject.toml; \\\nfi\n\n\n# This PEP 503 index\
            \ uses odoo addons from OCA and redirects the rest to PyPI,\n# in effect\
            \ hiding all non-OCA Odoo addons that are on PyPI.\nENV PIP_INDEX_URL=https://wheelhouse.odoo-community.org/oca-simple-and-pypi\n\
            \n# Install extra addons\nRUN if [ \"$(ls -A $ADDONS_DIR 2>/dev/null)\"\
            \ ]; then cd $ADDONS_DIR && pip install -e .; fi\n\n# Install OpenUpgrade\
            \ if required\nARG INSTALL_OPENUPGRADE\n\n# NB: Current script supports\
            \ targed verions 14.0+\nRUN if [ \"$INSTALL_OPENUPGRADE\" = \"yes\" ];\
            \ then \\\n    pip install git+https://github.com/OCA/openupgradelib.git@master#egg=openupgradelib\
            \ && \\\n    git clone --depth=1 --branch=${ODOO_VERSION} https://github.com/cetmix/OpenUpgrade.git\
            \ ${ADDONS_DIR}/OpenUpgrade && \\\n    ver=$(echo ${ODOO_VERSION} | cut\
            \ -d. -f1); \\\n    if [ \"$ver\" -lt 16 ]; then \\\n        pip install\
            \ odoo{% if odoo_version == \"14.0\" %}14{% endif %}-addon-openupgrade-framework;\
            \ \\\n    else \\\n        pip install -e ${ADDONS_DIR}/OpenUpgrade/openupgrade_framework;\
            \ \\\n    fi; \\\n    if [ \"$ver\" -ge 16 ]; then \\\n        pip install\
            \ -e ${ADDONS_DIR}/OpenUpgrade/openupgrade_scripts; \\\n    fi; \\\n \
            \   fi\n\n\n# Set default user when running the container\nUSER odoo"
          variable_ids:
          - reference: dockerfile_location
          - access_level: manager
            reference: install_python_packages
            name: Install Extra Python Packages
            variable_type: o
            option_ids:
