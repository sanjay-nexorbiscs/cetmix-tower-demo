            access_level: manager
            reference: upload_ufw_script
            name: Upload UFW script
            action: file_using_template
            allow_parallel_run: false
            note: false
            tag_ids:
            - reference: system
            - reference: firewall
            path: false
            file_template_id:
              reference: ufw_configuration_script
              name: UFW configuration script
              source: tower
              file_type: text
              server_dir: '{% if jet_root and "//" not in jet_root %}{{ jet_root }}/data{%
                else %}{{ tower_root }}{% endif %}'
              file_name: ufw_up.sh
              keep_when_deleted: false
              tag_ids:
              - reference: firewall
              note: Bash script that sets default UFW settings.
              code: |
                #!/usr/bin/env bash
                set -euo pipefail

                # Check if allow list is provided
                SSH_ALLOW_LIST="{{ ssh_allow_list }}"

                if [[ -z "$SSH_ALLOW_LIST" ]]; then
                  echo "ERROR: ssh_allow_list variable is empty"
                  exit 1
                fi

                # Reset to a known state
                ufw --force reset

                # Defaults
                ufw default deny incoming
                ufw default allow outgoing

                # Set SSH allowlist
                echo "Configuring SSH access for allowed IPs:"
                echo "$SSH_ALLOW_LIST"
                echo

                # Split comma-separated list into array
                IFS=',' read -ra IP_LIST <<< "$SSH_ALLOW_LIST"

                for ip in "${IP_LIST[@]}"; do
                  ip="$(echo "$ip" | xargs)"  # trim whitespace
                  echo "Allowing SSH from $ip"
                  ufw allow from "$ip" to any port 22 proto tcp comment "SSH from $ip"
                done


                # Web traffic
                ufw allow 80/tcp comment 'HTTP'
                ufw allow 443/tcp comment 'HTTPS'

                # Outgoing mail (Odoo client)
                for port in 25 465 587; do
                  ufw allow out "${port}/tcp" comment "SMTP ${port}"
                done

                for port in 143 993; do
                  ufw allow out "${port}/tcp" comment "IMAP ${port}"
                done

                for port in 110 995; do
                  ufw allow out "${port}/tcp" comment "POP3 ${port}"
                done

                # Enable firewall
                ufw --force enable

                # Enable logging
                ufw logging low

                echo
                echo "UFW enabled with the following rules:"
                ufw status verbose
