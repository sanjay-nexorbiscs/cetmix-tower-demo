cetmix_tower_yaml_version: 1
manifest:
  name: Restore Odoo from S3
  summary: Restore Odoo backup from Amazon S3
  description: |-
    Restores an Odoo database from a backup stored in Amazon S3.
    You need to allow "ListBucket" and "GetObject". Below is a policy example:
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": ["s3:ListBucket"],
          "Resource": "arn:aws:s3:::my-bucket"
        },
        {
          "Effect": "Allow",
          "Action": ["s3:GetObject"],
          "Resource": "arn:aws:s3:::my-bucket/*"
        }
      ]
    }
  author:
  - "Cetmix O\xDC"
  version: 1.0.0
  website: https://cetmix.com
  license: AGPL-3
records:
- cetmix_tower_model: command
  access_level: manager
  reference: restore_odoo_from_s3
  name: Restore Odoo DB from S3
  action: ssh_command
  allow_parallel_run: false
  note: |-
    Restores an Odoo database from a backup stored in Amazon S3.
    You need to allow "ListBucket" and "GetObject". Below is a policy example:
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": ["s3:ListBucket"],
          "Resource": "arn:aws:s3:::my-bucket"
        },
        {
          "Effect": "Allow",
          "Action": ["s3:GetObject"],
          "Resource": "arn:aws:s3:::my-bucket/*"
        }
      ]
    }
  tag_ids:
  - reference: system
    name: System
    color: 1
  - reference: odoo
    name: Odoo
    color: 5
  path: false
  code: |
    docker run -d --rm --user=root \
      -e AWS_ACCESS_KEY_ID=#!cxtower.secret.aws_key_id!# \
      -e AWS_SECRET_ACCESS_KEY=#!cxtower.secret.aws_access_key!# \
      -e AWS_REGION={{ aws_region }} \
      -v {{ odoo_data }}:/var/lib/odoo \
    {% if tower_docker_network %}
      -e HOST={{ shared_postgres_name }} --network={{ tower_docker_network }} \
    {% else %}
      --link {{ shared_postgres_name }}:db \
    {% endif %}
      --name {{ odoo_container_name }}_restore_{{ odoo_db_name_restore }}_{{ tower.tools.now_underscore }} -t {{ odoo_image_name }} \
    sh -c "\
    apt-get update && \
    DEBIAN_FRONTEND=noninteractive apt-get install -y awscli && \
    grep -q '^db_host' /etc/odoo.conf && sed -i 's/^db_host.*/db_host = {{ shared_postgres_name }}/' /etc/odoo.conf || echo 'db_host = {{ shared_postgres_name }}' >> /etc/odoo.conf; \
    grep -q '^db_user' /etc/odoo.conf && sed -i 's/^db_user.*/db_user = odoo/' /etc/odoo.conf || echo 'db_user = odoo' >> /etc/odoo.conf; \
    grep -q '^db_password' /etc/odoo.conf && sed -i 's/^db_password.*/db_password = #!cxtower.secret.postgres_password!#/' /etc/odoo.conf || echo 'db_password = #!cxtower.secret.postgres_password!#' >> /etc/odoo.conf; \
    aws s3 cp {{ odoo_backup_location }}/{{ backup_file_name }} {{ odoo_data }}/{{ backup_file_name }} && \
    click-odoo-restoredb {% if odoo_neutralize_restored_db and odoo_neutralize_restored_db =='yes' %}--neutralize{% endif %} {{ odoo_db_name_restore }} {{ odoo_data }}/{{ backup_file_name }}; \
    rm -f {{ odoo_data }}/{{ backup_file_name }} \
    "
  server_status: false
  variable_ids:
  - access_level: manager
    reference: aws_region
    name: AWS Region
    variable_type: s
